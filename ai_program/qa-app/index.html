<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 问答</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            width: 700px;
            max-width: 95vw;
            height: 80vh;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            padding: 20px 24px;
            background: #4f46e5;
            color: #fff;
        }
        .header h1 { font-size: 20px; font-weight: 600; }
        .header p { font-size: 14px; opacity: 0.85; margin-top: 4px; }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
        }
        .message {
            margin-bottom: 16px;
            display: flex;
            gap: 12px;
        }
        .message.user { justify-content: flex-end; }
        .message .avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        .message.bot .avatar { background: #4f46e5; color: #fff; }
        .message.user .avatar { background: #10b981; color: #fff; order: 1; }
        .message .bubble {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.6;
            word-break: break-word;
        }
        .message.bot .bubble {
            background: #f0f2f5;
            border-bottom-left-radius: 4px;
        }
        .message.user .bubble {
            background: #4f46e5;
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .message.user .bubble p { margin: 0; }
        .input-area {
            padding: 16px 24px;
            border-top: 1px solid #e5e7eb;
            display: flex;
            gap: 12px;
            background: #fff;
        }
        .input-area textarea {
            flex: 1;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 15px;
            resize: none;
            outline: none;
            font-family: inherit;
            min-height: 48px;
            max-height: 120px;
        }
        .input-area textarea:focus { border-color: #4f46e5; }
        .input-area button {
            padding: 0 24px;
            background: #4f46e5;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .input-area button:hover { background: #4338ca; }
        .input-area button:disabled { opacity: 0.6; cursor: not-allowed; }
        .loading { display: none; text-align: center; padding: 20px; color: #9ca3af; }
        .loading.show { display: block; }
        .error { color: #ef4444; font-size: 14px; text-align: center; padding: 8px; }
        pre { white-space: pre-wrap; font-family: inherit; margin: 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>AI 问答</h1>
            <p>基于 LangChain + OpenAI 的智能问答助手</p>
        </div>
        <div class="messages" id="messages"></div>
        <div class="loading" id="loading">AI 思考中...</div>
        <div class="error" id="error"></div>
        <div class="input-area">
            <textarea id="question" rows="1" placeholder="请输入你的问题..." onkeydown="handleKeydown(event)"></textarea>
            <button id="sendBtn" onclick="sendQuestion()">发送</button>
        </div>
    </div>
    <script>
        const messagesEl = document.getElementById('messages');
        const loadingEl = document.getElementById('loading');
        const errorEl = document.getElementById('error');
        const questionEl = document.getElementById('question');
        const sendBtn = document.getElementById('sendBtn');

        function addMessage(type, text) {
            const div = document.createElement('div');
            div.className = 'message ' + type;
            const avatar = type === 'bot' ? 'AI' : '我';
            div.innerHTML = '<div class="avatar">' + avatar + '</div><div class="bubble"><pre>' + escapeHtml(text) + '</pre></div>';
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function setLoading(show) {
            loadingEl.className = 'loading' + (show ? ' show' : '');
            sendBtn.disabled = show;
        }

        function clearError() { errorEl.textContent = ''; }

        function setError(msg) { errorEl.textContent = msg; }

        function handleKeydown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendQuestion();
            }
        }

        async function sendQuestion() {
            const question = questionEl.value.trim();
            if (!question) return;

            clearError();
            addMessage('user', question);
            questionEl.value = '';
            questionEl.style.height = 'auto';
            setLoading(true);

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question })
                });
                const data = await res.json();
                if (data.error) {
                    setError(data.error);
                } else {
                    addMessage('bot', data.answer);
                }
            } catch (err) {
                setError('网络错误，请稍后重试');
            } finally {
                setLoading(false);
            }
        }

        questionEl.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });
    </script>
</body>
</html>
